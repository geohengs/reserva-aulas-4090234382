name: Validar HTML

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Validar sintaxis HTML
      uses: Cyb3r-Jak3/html5validator-action@v7.2.0
      with:
        root: .
